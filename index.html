<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khayaal Perfumes - تواصل معنا</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: rgba(20, 20, 20, 0.98);
            border-radius: 30px;
            padding: 45px 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), 0 0 40px rgba(212, 175, 55, 0.15);
            text-align: center;
            animation: fadeIn 0.6s ease-out;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-container {
            margin-bottom: 30px;
            animation: slideDown 0.8s ease-out;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            background: #1a1a1a;
            border: 3px solid #d4af37;
            box-shadow: 0 10px 40px rgba(212, 175, 55, 0.4), inset 0 0 20px rgba(212, 175, 55, 0.1);
            transition: transform 0.3s ease;
            cursor: pointer;
        }

        .logo:hover {
            transform: scale(1.08) rotate(5deg);
            box-shadow: 0 15px 50px rgba(212, 175, 55, 0.6), inset 0 0 20px rgba(212, 175, 55, 0.2);
        }

        .upload-section {
            display: inline-block;
        }

        .upload-label {
            cursor: pointer;
        }

        .upload-placeholder {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 3px dashed #d4af37;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(212, 175, 55, 0.03);
            transition: all 0.3s ease;
        }

        .upload-placeholder:hover {
            background: rgba(212, 175, 55, 0.1);
            border-color: #ffd700;
            transform: scale(1.08);
        }

        .upload-placeholder p {
            margin-top: 10px;
            color: #d4af37;
            font-size: 13px;
            font-weight: 600;
        }

        h1 {
            color: #d4af37;
            font-size: 36px;
            margin-bottom: 8px;
            font-weight: 700;
            letter-spacing: 2px;
            text-shadow: 0 2px 10px rgba(212, 175, 55, 0.3);
        }

        .tagline {
            color: #999;
            font-size: 14px;
            margin-bottom: 35px;
            font-weight: 400;
            letter-spacing: 1px;
        }

        .website-link {
            display: block;
            width: 100%;
            padding: 22px 30px;
            background: linear-gradient(135deg, #d4af37 0%, #f0d76a 100%);
            color: #1a1a1a;
            text-decoration: none;
            border-radius: 18px;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 35px;
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.4);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .website-link::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .website-link:hover::before {
            left: 100%;
        }

        .website-link:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(212, 175, 55, 0.7);
        }

        .website-icon {
            display: inline-block;
            margin-left: 10px;
            font-size: 24px;
        }

        .social-links {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }

        .social-button {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 20px 15px;
            background: rgba(212, 175, 55, 0.05);
            border: 2px solid rgba(212, 175, 55, 0.3);
            border-radius: 16px;
            text-decoration: none;
            color: #d4af37;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .social-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.1), transparent);
            transition: left 0.5s ease;
        }

        .social-button:hover::before {
            left: 100%;
        }

        .social-button:hover {
            transform: translateY(-5px);
            border-color: #d4af37;
            background: rgba(212, 175, 55, 0.15);
            box-shadow: 0 8px 20px rgba(212, 175, 55, 0.3);
        }

        .social-icon {
            width: 40px;
            height: 40px;
            transition: transform 0.3s ease;
        }

        .social-button:hover .social-icon {
            transform: scale(1.15);
        }

        .footer {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(212, 175, 55, 0.2);
            color: #666;
            font-size: 13px;
        }

        @media (max-width: 480px) {
            .container {
                padding: 35px 20px;
            }

            h1 {
                font-size: 30px;
            }

            .website-link {
                padding: 18px 25px;
                font-size: 18px;
            }

            .social-links {
                gap: 12px;
            }

            .social-button {
                padding: 18px 12px;
                font-size: 14px;
            }

            .logo {
                width: 120px;
                height: 120px;
            }

            .upload-placeholder {
                width: 120px;
                height: 120px;
            }
        }
    </style>
</head>
<body>

    <script>
        // Auto-load logo from same folder
        const logoImg = document.getElementById('logoImg');
        const uploadSection = document.querySelector('.upload-section');

        // Try to load logo.jpeg from the same folder
        const img = new Image();
        img.onload = function() {
            // Create canvas for circular crop
            const canvas = document.createElement('canvas');
            const size = Math.max(img.width, img.height);
            canvas.width = size;
            canvas.height = size;
            
            const ctx = canvas.getContext('2d');
            
            // Fill background
            ctx.fillStyle = 'transparent';
            ctx.fillRect(0, 0, size, size);
            
            // Draw circular clip
            ctx.beginPath();
            ctx.arc(size/2, size/2, size/2, 0, Math.PI * 2);
            ctx.closePath();
            ctx.clip();
            
            // Draw image centered
            const offsetX = (size - img.width) / 2;
            const offsetY = (size - img.height) / 2;
            ctx.drawImage(img, offsetX, offsetY, img.width, img.height);
            
            // Set as logo and show it
            logoImg.src = canvas.toDataURL();
            logoImg.style.display = 'block';
            uploadSection.style.display = 'none';
        };

        img.onerror = function() {
            // If logo not found, show upload placeholder
            console.log('Logo not found - upload placeholder shown');
        };

        // Load logo from same folder
        img.src = 'logo.jpeg';

        // Optional: Allow clicking logo to upload a new one
        logoImg.addEventListener('click', function() {
            const logoUpload = document.getElementById('logoUpload');
            if (logoUpload) logoUpload.click();
        });

        // Handle manual upload if needed
        const logoUpload = document.getElementById('logoUpload');
        if (logoUpload) {
            logoUpload.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        const uploadImg = new Image();
                        uploadImg.onload = function() {
                            const canvas = document.createElement('canvas');
                            const size = Math.max(uploadImg.width, uploadImg.height);
                            canvas.width = size;
                            canvas.height = size;
                            
                            const ctx = canvas.getContext('2d');
                            ctx.fillStyle = 'transparent';
                            ctx.fillRect(0, 0, size, size);
                            ctx.beginPath();
                            ctx.arc(size/2, size/2, size/2, 0, Math.PI * 2);
                            ctx.closePath();
                            ctx.clip();
                            
                            const offsetX = (size - uploadImg.width) / 2;
                            const offsetY = (size - uploadImg.height) / 2;
                            ctx.drawImage(uploadImg, offsetX, offsetY, uploadImg.width, uploadImg.height);
                            
                            logoImg.src = canvas.toDataURL();
                            logoImg.style.display = 'block';
                            uploadSection.style.display = 'none';
                        };
                        uploadImg.src = event.target.result;
                    };
                    reader.readAsDataURL(file);
                }
            });
        }
    </script>
